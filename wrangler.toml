# Cloudflare Workers Configuration for MyGPT
name = "mygpt"
main = ".output/server/index.mjs"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 静的アセット（legacy形式）
[site]
bucket = ".output/public"

# D1データベース設定
# 注意: database_id は実際のD1作成後に手動で設定する必要があります
# 設定手順:
# 1. npx wrangler d1 create mygpt を実行
# 2. 出力された database_id を以下の PLACEHOLDER に置き換え
[[d1_databases]]
binding = "MYGPT_DB"
database_name = "mygpt-db"
database_id = "8e45361e-0641-4474-938c-03d15197196c" 

# 環境変数（シークレット）
# OPENAI_API_KEY は以下のコマンドで設定:
# npx wrangler secret put OPENAI_API_KEY
